<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de productos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  

<main class="contenedor-form">
  <div id="mensaje"></div>
  <div id="modal-overlay" class="oculto">
    <div class="modal-box">
      <p id="modal-text"></p>
      <input id="modal-input" type="text" class="oculto" />
      <div class="modal-actions">
        <button id="modal-cancel" type="button">Cancelar</button>
        <button id="modal-accept" type="button">Aceptar</button>
      </div>
    </div>
  </div>

  <h1>Gestión de productos</h1>

  <input id="nombre" placeholder="Nombre del producto">
  <input id="precio" type="number" placeholder="Precio de venta">
  <input id="stock" type="number" placeholder="Stock inicial">

  <button onclick="crear()">Crear producto</button>


  <div id="lista">
    
    <div class="item-producto">
      <span class="nombre-producto">Cuadernos argollados (100 hojas)</span>
      <span class="info-producto">Precio: $23.000,00 | Stock: 40</span>
      <button class="btn-restock">Restock</button>
      <button class="btn-eliminar">Eliminar</button>
      <button class="btn-editar">Editar</button>
    </div>

  </div>

  <button id="volver">Volver</button>

</main>

<script src="productos.js"></script>
</body>
</html>
