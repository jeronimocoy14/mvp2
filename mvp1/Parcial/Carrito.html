<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Venta en curso - Papel y Luna</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="mensaje" class="mensaje"></div>

<h1>Venta en curso</h1>

<div id="carrito-lista"></div> 

<h2>Total: <span id="total-carrito">$0</span></h2>

<select id="metodo">
  <option value="">Seleccione método de pago</option>
  <option value="Efectivo">Efectivo</option>
  <option value="Nequi">Nequi</option>
  <option value="tarjeta">Tarjeta</option>
</select>

<div id="efectivo-box" style="display:none">
  <input type="number" id="recibido" placeholder="Valor recibido">
  <p>Cambio: <span id="cambio">$0</span></p>
</div>

<div class="acciones">
  <button id="cerrar">Cerrar venta</button>
  <button id="vaciar" onclick="vaciar_carrito()">Vaciar carrito</button>
  <button id="volver" onclick="window.location.href='PapelLuna.html'">Volver al catálogo</button>
</div>

<footer>
  <p>© 2026 Papel y Luna. Todos los derechos reservados.</p>
  <p><strong>Dirección:</strong> Calle 10 #5-35, Chía, Cundinamarca</p>
  <p><strong>Teléfono:</strong> 350 884 1010</p>
</footer>

<script src="data.js"></script>
<script src="carrito.js"></script>

</body>
</html>
